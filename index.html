<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reddit ReactJS Posts</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: #2c3e50;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .header p {
            color: #7f8c8d;
            font-size: 1.1em;
        }

        .loading {
            text-align: center;
            font-size: 1.2em;
            color: #3498db;
            margin: 50px 0;
        }

        .loading::after {
            content: '';
            animation: dots 1.5s steps(5, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }

        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .card {
            background: #fff;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            border-left: 5px solid #3498db;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #3498db, #9b59b6, #e74c3c);
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }

        .card-title {
            color: #2c3e50;
            font-size: 1.4em;
            font-weight: 600;
            margin-bottom: 15px;
            line-height: 1.3;
            cursor: pointer;
        }

        .card-title:hover {
            color: #3498db;
        }

        .card-content {
            color: #555;
            line-height: 1.6;
            margin-bottom: 20px;
            max-height: 150px;
            overflow: hidden;
            position: relative;
        }

        .card-content p {
            margin-bottom: 10px;
        }

        .card-content.expanded {
            max-height: none;
        }

        .expand-btn {
            background: none;
            border: none;
            color: #3498db;
            cursor: pointer;
            font-size: 0.9em;
            margin-top: 10px;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #ecf0f1;
        }

        .card-link {
            display: inline-flex;
            align-items: center;
            background: linear-gradient(45deg, #3498db, #2980b9);
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 0.9em;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .card-link:hover {
            background: linear-gradient(45deg, #2980b9, #1f4e79);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4);
        }

        .card-score {
            background: linear-gradient(45deg, #e74c3c, #c0392b);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9em;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .score-positive {
            background: linear-gradient(45deg, #27ae60, #229954);
        }

        .score-high {
            background: linear-gradient(45deg, #f39c12, #e67e22);
        }

        .error {
            background: #e74c3c;
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin: 20px 0;
        }

        /* Responsive Design */
        @media (max-width: 1280px) {
            .posts-grid {
                grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
                margin: 10px;
            }

            .header h1 {
                font-size: 2em;
            }

            .posts-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .card {
                padding: 20px;
            }

            .card-footer {
                flex-direction: column;
                gap: 15px;
                align-items: stretch;
            }

            .card-link, .card-score {
                text-align: center;
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            .container {
                margin: 5px;
                padding: 15px;
            }

            .posts-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .card {
                padding: 15px;
            }

            .card-title {
                font-size: 1.2em;
            }
        }

        /* Animation for cards appearing */
        .card {
            animation: slideUp 0.6s ease forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        .card:nth-child(odd) {
            animation-delay: 0.1s;
        }

        .card:nth-child(even) {
            animation-delay: 0.2s;
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 ReactJS Reddit Posts</h1>
            <p>Latest posts from r/reactjs community</p>
        </div>
        
        <div id="loading" class="loading">Loading posts</div>
        <div id="error" class="error" style="display: none;"></div>
        <div id="posts-container" class="posts-grid"></div>
    </div>

    <script>
        // Function to decode HTML entities
        function decodeHtml(html) {
            if (!html) return '';
            const txt = document.createElement('textarea');
            txt.innerHTML = html;
            return txt.value;
        }

        // Function to truncate text
        function truncateText(text, maxLength) {
            if (!text || text.length <= maxLength) return text;
            return text.substring(0, maxLength) + '...';
        }

        // Function to format score with appropriate styling
        function getScoreClass(score) {
            if (score > 100) return 'score-high';
            if (score > 0) return 'score-positive';
            return '';
        }

        // Function to create a card element
        function createCard(post) {
            const { title, selftext_html, url, score } = post.data;
            
            const card = document.createElement('div');
            card.className = 'card';

            // Title
            const cardTitle = document.createElement('h2');
            cardTitle.className = 'card-title';
            cardTitle.textContent = title;
            cardTitle.onclick = () => window.open(url, '_blank');

            // Content
            const cardContent = document.createElement('div');
            cardContent.className = 'card-content';
            
            if (selftext_html && selftext_html.trim() !== '') {
                const decodedContent = decodeHtml(selftext_html);
                cardContent.innerHTML = decodedContent;
                
                // Add expand/collapse functionality for long content
                if (decodedContent.length > 300) {
                    const expandBtn = document.createElement('button');
                    expandBtn.className = 'expand-btn';
                    expandBtn.textContent = 'Read more';
                    expandBtn.onclick = () => {
                        cardContent.classList.toggle('expanded');
                        expandBtn.textContent = cardContent.classList.contains('expanded') ? 'Read less' : 'Read more';
                    };
                    cardContent.appendChild(expandBtn);
                }
            } else {
                cardContent.innerHTML = '<p><em>No additional content available.</em></p>';
            }

            // Footer with link and score
            const cardFooter = document.createElement('div');
            cardFooter.className = 'card-footer';

            const cardLink = document.createElement('a');
            cardLink.className = 'card-link';
            cardLink.href = url;
            cardLink.target = '_blank';
            cardLink.textContent = '🔗 View Post';

            const cardScore = document.createElement('div');
            cardScore.className = `card-score ${getScoreClass(score)}`;
            cardScore.innerHTML = `⬆️ ${score} points`;

            cardFooter.appendChild(cardLink);
            cardFooter.appendChild(cardScore);

            card.appendChild(cardTitle);
            card.appendChild(cardContent);
            card.appendChild(cardFooter);

            return card;
        }

        // Function to display error message
        function showError(message) {
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            
            loading.style.display = 'none';
            error.style.display = 'block';
            error.textContent = message;
        }

        // Function to fetch and display Reddit posts
        async function fetchRedditPosts() {
            try {
                const response = await fetch('https://www.reddit.com/r/reactjs.json');
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                const posts = data.data.children;

                // Hide loading indicator
                document.getElementById('loading').style.display = 'none';

                if (!posts || posts.length === 0) {
                    showError('No posts found.');
                    return;
                }

                // Create container for posts
                const container = document.getElementById('posts-container');
                
                // Create and append cards
                posts.forEach((post, index) => {
                    const card = createCard(post);
                    // Add staggered animation delay
                    card.style.animationDelay = `${index * 0.1}s`;
                    container.appendChild(card);
                });

            } catch (error) {
                console.error('Error fetching Reddit data:', error);
                showError(`Failed to load posts: ${error.message}. This might be due to CORS restrictions. Try using a CORS proxy or running the page from a web server.`);
            }
        }

        // Initialize the application
        document.addEventListener('DOMContentLoaded', fetchRedditPosts);
    </script>
</body>
</html>
